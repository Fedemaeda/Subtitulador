<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtitulador</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #7c5cfc, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #888;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .container {
            width: 100%;
            max-width: 640px;
        }

        /* Drop zone */
        .dropzone {
            border: 2px dashed #333;
            border-radius: 16px;
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #1a1a1a;
            position: relative;
        }

        .dropzone:hover, .dropzone.dragover {
            border-color: #7c5cfc;
            background: #1e1e2e;
        }

        .dropzone.has-file {
            border-color: #00d4ff;
            border-style: solid;
        }

        .dropzone input[type="file"] {
            display: none;
        }

        .dropzone .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }

        .dropzone .label {
            font-size: 1.1rem;
            color: #ccc;
            margin-bottom: 0.5rem;
        }

        .dropzone .hint {
            font-size: 0.8rem;
            color: #666;
        }

        .filename {
            color: #00d4ff;
            font-weight: 500;
            margin-top: 0.5rem;
            word-break: break-all;
        }

        /* Options */
        .options {
            margin-top: 1.2rem;
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .options label {
            font-size: 0.85rem;
            color: #999;
            white-space: nowrap;
        }

        .options select {
            background: #1a1a1a;
            color: #e0e0e0;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            cursor: pointer;
            flex: 1;
        }

        .options select:focus {
            outline: none;
            border-color: #7c5cfc;
        }

        /* Button */
        .btn {
            margin-top: 1.5rem;
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: linear-gradient(135deg, #7c5cfc, #5a3fd4);
            color: white;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(124, 92, 252, 0.4);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Progress */
        .progress-container {
            margin-top: 1.5rem;
            display: none;
        }

        .progress-container.active {
            display: block;
        }

        .progress-bar-bg {
            background: #1a1a1a;
            border-radius: 8px;
            height: 8px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #7c5cfc, #00d4ff);
            border-radius: 8px;
            width: 0%;
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 0.85rem;
            color: #888;
            margin-top: 0.5rem;
            text-align: center;
        }

        /* Result */
        .result {
            margin-top: 1.5rem;
            display: none;
            text-align: center;
        }

        .result.active {
            display: block;
        }

        .result .success-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .result .message {
            color: #4ade80;
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 1rem;
        }

        .btn-download {
            display: inline-block;
            padding: 0.7rem 2rem;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: white;
            border: none;
            transition: all 0.2s;
        }

        .btn-download:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.4);
        }

        .btn-reset {
            display: inline-block;
            margin-top: 0.8rem;
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            background: transparent;
            color: #888;
            border: 1px solid #333;
            transition: all 0.2s;
        }

        .btn-reset:hover {
            border-color: #666;
            color: #ccc;
        }

        /* Error */
        .error {
            margin-top: 1.5rem;
            display: none;
            background: #2a1515;
            border: 1px solid #5c2020;
            border-radius: 10px;
            padding: 1rem;
            color: #f87171;
            font-size: 0.9rem;
        }

        .error.active {
            display: block;
        }

        .error strong {
            display: block;
            margin-bottom: 0.3rem;
        }

        /* Spinner */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <h1>Subtitulador</h1>
    <p class="subtitle">Sube un video, transcribe el audio y descarga el video con subtítulos</p>

    <div class="container">
        <div class="dropzone" id="dropzone">
            <input type="file" id="fileInput" accept="video/*">
            <span class="icon">🎬</span>
            <div class="label">Arrastra un video aquí o haz clic para seleccionar</div>
            <div class="hint">MP4, MKV, AVI, MOV, WebM — hasta 2 GB</div>
            <div class="filename" id="filename"></div>
        </div>

        <div class="options">
            <label for="language">Idioma del audio:</label>
            <select id="language">
                <option value="">Auto-detectar</option>
                <option value="es">Español</option>
                <option value="en">English</option>
                <option value="pt">Português</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
                <option value="it">Italiano</option>
                <option value="ja">日本語 (Japonés)</option>
                <option value="ko">한국어</option>
                <option value="zh">中文</option>
                <option value="ru">Русский</option>
                <option value="ar">العربية</option>
            </select>
        </div>

        <div class="options">
            <label for="targetLanguage">Traducir subtítulos a:</label>
            <select id="targetLanguage">
                <option value="">Sin traducción</option>
                <option value="es" selected>Español</option>
                <option value="en">English</option>
                <option value="pt">Português</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
                <option value="it">Italiano</option>
                <option value="ja">日本語</option>
                <option value="ko">한국어</option>
                <option value="zh">中文</option>
                <option value="ru">Русский</option>
                <option value="ar">العربية</option>
            </select>
        </div>

        <button class="btn" id="btnTranscribe" disabled>
            Transcribir y añadir subtítulos
        </button>

        <div class="progress-container" id="progress">
            <div class="progress-bar-bg">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="progress-text" id="progressText">Preparando...</div>
        </div>

        <div class="result" id="result">
            <div class="success-icon">✅</div>
            <div class="message">¡Listo! Tu video está subtitulado</div>
            <a class="btn-download" id="btnDownload" href="#">Descargar video</a>
            <br>
            <button class="btn-reset" id="btnReset">Procesar otro video</button>
        </div>

        <div class="error" id="error">
            <strong>Error</strong>
            <span id="errorText"></span>
        </div>
    </div>

    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const filename = document.getElementById('filename');
        const btnTranscribe = document.getElementById('btnTranscribe');
        const progress = document.getElementById('progress');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const result = document.getElementById('result');
        const btnDownload = document.getElementById('btnDownload');
        const btnReset = document.getElementById('btnReset');
        const errorDiv = document.getElementById('error');
        const errorText = document.getElementById('errorText');
        const language = document.getElementById('language');
        const targetLanguage = document.getElementById('targetLanguage');

        let selectedFile = null;
        let downloadUrl = null;

        // Click to upload
        dropzone.addEventListener('click', () => fileInput.click());

        // File selected
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        // Drag and drop
        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('dragover');
        });

        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('dragover');
        });

        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });

        function handleFile(file) {
            selectedFile = file;
            filename.textContent = `${file.name} (${(file.size / 1024 / 1024).toFixed(1)} MB)`;
            dropzone.classList.add('has-file');
            btnTranscribe.disabled = false;
            hideError();
        }

        // Transcribe
        btnTranscribe.addEventListener('click', async () => {
            if (!selectedFile) return;

            btnTranscribe.disabled = true;
            btnTranscribe.innerHTML = '<span class="spinner"></span> Procesando...';
            progress.classList.add('active');
            result.classList.remove('active');
            hideError();

            // Fake progress (real progress not possible with this backend approach)
            let pct = 0;
            const progressInterval = setInterval(() => {
                pct = Math.min(pct + Math.random() * 3, 95);
                progressBar.style.width = pct + '%';
                if (pct < 15) progressText.textContent = 'Extrayendo audio...';
                else if (pct < 25) progressText.textContent = 'Detectando silencios...';
                else if (pct < 55) progressText.textContent = 'Transcribiendo audio...';
                else if (pct < 65) progressText.textContent = 'Limpiando subtítulos...';
                else if (pct < 80) progressText.textContent = 'Traduciendo...';
                else if (pct < 92) progressText.textContent = 'Quemando subtítulos en el video...';
                else progressText.textContent = 'Preparando descarga...';
            }, 1000);

            try {
                const formData = new FormData();
                formData.append('video', selectedFile);
                formData.append('language', language.value);
                formData.append('target_language', targetLanguage.value);

                const response = await fetch('/transcribe', {
                    method: 'POST',
                    body: formData,
                });

                clearInterval(progressInterval);

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.error || 'Error del servidor');
                }

                // Get the video blob
                const blob = await response.blob();
                downloadUrl = URL.createObjectURL(blob);

                progressBar.style.width = '100%';
                progressText.textContent = '¡Completado!';

                setTimeout(() => {
                    progress.classList.remove('active');
                    result.classList.add('active');
                    btnDownload.href = downloadUrl;
                    const ext = selectedFile.name.split('.').pop();
                    btnDownload.download = selectedFile.name.replace(/\.[^.]+$/, '') + '_subtitled.' + ext;
                }, 500);

            } catch (err) {
                clearInterval(progressInterval);
                progress.classList.remove('active');
                showError(err.message);
                btnTranscribe.disabled = false;
                btnTranscribe.innerHTML = 'Transcribir y añadir subtítulos';
            }
        });

        // Reset
        btnReset.addEventListener('click', () => {
            selectedFile = null;
            fileInput.value = '';
            filename.textContent = '';
            dropzone.classList.remove('has-file');
            btnTranscribe.disabled = true;
            btnTranscribe.innerHTML = 'Transcribir y añadir subtítulos';
            result.classList.remove('active');
            progress.classList.remove('active');
            progressBar.style.width = '0%';
            hideError();
            if (downloadUrl) {
                URL.revokeObjectURL(downloadUrl);
                downloadUrl = null;
            }
        });

        function showError(msg) {
            errorText.textContent = msg;
            errorDiv.classList.add('active');
        }

        function hideError() {
            errorDiv.classList.remove('active');
        }
    </script>
</body>
</html>
