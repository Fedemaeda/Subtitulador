<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtitulador</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f0f0f; --surface: #1a1a1a; --border: #333;
            --text: #e0e0e0; --text2: #888; --text3: #666;
            --accent: #7c5cfc; --accent2: #00d4ff;
            --success: #4ade80; --error-bg: #2a1515; --error-border: #5c2020; --error: #f87171;
        }
        [data-theme="light"] {
            --bg: #f5f5f5; --surface: #fff; --border: #ddd;
            --text: #1a1a1a; --text2: #666; --text3: #999;
            --accent: #6b4ce6; --accent2: #0099cc;
            --success: #16a34a; --error-bg: #fef2f2; --error-border: #fecaca; --error: #dc2626;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; padding: 2rem 1rem;
            transition: background 0.3s, color 0.3s;
        }

        .header { display: flex; align-items: center; gap: 1rem; width: 100%; max-width: 700px; }
        h1 {
            font-size: 2rem; font-weight: 600; flex: 1;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .theme-toggle {
            background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
            padding: 0.4rem 0.7rem; cursor: pointer; font-size: 1.1rem;
            color: var(--text); transition: all 0.2s;
        }
        .theme-toggle:hover { border-color: var(--accent); }
        .subtitle { color: var(--text2); margin-bottom: 1.5rem; font-size: 0.95rem; max-width: 700px; width: 100%; text-align: center; }

        .container { width: 100%; max-width: 700px; }

        .gpu-badge {
            display: inline-block; background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; padding: 0.3rem 0.8rem; font-size: 0.8rem;
            color: var(--text2); margin-bottom: 1rem;
        }
        .gpu-badge .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 0.4rem; }
        .gpu-badge .dot.on { background: var(--success); }
        .gpu-badge .dot.off { background: #f59e0b; }

        /* Drop zone */
        .dropzone {
            border: 2px dashed var(--border); border-radius: 16px; padding: 2.5rem 2rem;
            text-align: center; cursor: pointer; transition: all 0.2s;
            background: var(--surface);
        }
        .dropzone:hover, .dropzone.dragover { border-color: var(--accent); }
        .dropzone.has-file { border-color: var(--accent2); border-style: solid; }
        .dropzone input[type="file"] { display: none; }
        .dropzone .icon { font-size: 2.5rem; margin-bottom: 0.8rem; display: block; }
        .dropzone .label { font-size: 1.05rem; color: var(--text); margin-bottom: 0.4rem; }
        .dropzone .hint { font-size: 0.8rem; color: var(--text3); }
        .filename { color: var(--accent2); font-weight: 500; margin-top: 0.5rem; word-break: break-all; }

        /* Config panel */
        .config-toggle {
            margin-top: 1rem; background: none; border: 1px solid var(--border);
            border-radius: 8px; padding: 0.5rem 1rem; color: var(--text2);
            cursor: pointer; font-size: 0.85rem; width: 100%; transition: all 0.2s;
        }
        .config-toggle:hover { border-color: var(--accent); color: var(--text); }
        .config-panel {
            display: none; margin-top: 0.8rem; background: var(--surface);
            border: 1px solid var(--border); border-radius: 12px; padding: 1rem;
        }
        .config-panel.open { display: block; }
        .config-row { display: flex; gap: 1rem; margin-bottom: 0.8rem; flex-wrap: wrap; }
        .config-item { flex: 1; min-width: 140px; }
        .config-item label { display: block; font-size: 0.8rem; color: var(--text2); margin-bottom: 0.3rem; }
        .config-item select, .config-item input[type="range"] { width: 100%; }
        .config-item select {
            background: var(--bg); color: var(--text); border: 1px solid var(--border);
            border-radius: 6px; padding: 0.4rem; font-size: 0.85rem;
        }
        .config-item input[type="range"] {
            -webkit-appearance: none; height: 6px; background: var(--border); border-radius: 3px;
            outline: none; margin-top: 0.4rem;
        }
        .config-item input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
            background: var(--accent); cursor: pointer;
        }
        .range-val { font-size: 0.75rem; color: var(--text3); text-align: right; }

        /* Options row */
        .options { margin-top: 1.2rem; display: flex; gap: 1rem; align-items: center; }
        .options label { font-size: 0.85rem; color: var(--text2); white-space: nowrap; }
        .options select {
            background: var(--bg); color: var(--text); border: 1px solid var(--border);
            border-radius: 8px; padding: 0.5rem 1rem; font-size: 0.9rem;
            cursor: pointer; flex: 1;
        }
        .options select:focus { outline: none; border-color: var(--accent); }

        /* Buttons */
        .btn-row { display: flex; gap: 0.8rem; margin-top: 1.5rem; }
        .btn {
            flex: 1; padding: 0.9rem; border: none; border-radius: 12px;
            font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #5a3fd4); color: white;
        }
        .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(124,92,252,0.4); }
        .btn-secondary {
            background: linear-gradient(135deg, var(--accent2), #0077aa); color: white;
        }
        .btn-secondary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,212,255,0.4); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Progress */
        .progress-container { margin-top: 1.5rem; display: none; }
        .progress-container.active { display: block; }
        .progress-bar-bg { background: var(--surface); border-radius: 8px; height: 8px; overflow: hidden; border: 1px solid var(--border); }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 8px; width: 0%; transition: width 0.3s; }
        .progress-text { font-size: 0.85rem; color: var(--text2); margin-top: 0.5rem; text-align: center; }

        /* Result */
        .result { margin-top: 1.5rem; display: none; text-align: center; }
        .result.active { display: block; }
        .result .success-icon { font-size: 3rem; margin-bottom: 0.5rem; }
        .result .message { color: var(--success); font-size: 1.1rem; font-weight: 500; margin-bottom: 1rem; }

        /* Preview */
        .preview { margin-top: 1rem; border-radius: 12px; overflow: hidden; background: #000; }
        .preview video { width: 100%; max-height: 400px; border-radius: 12px; }

        .btn-download {
            display: inline-block; padding: 0.7rem 2rem; border-radius: 10px;
            font-size: 1rem; font-weight: 600; cursor: pointer; text-decoration: none;
            background: linear-gradient(135deg, var(--accent2), #0099cc);
            color: white; border: none; transition: all 0.2s; margin: 0.3rem;
        }
        .btn-download:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,212,255,0.4); }
        .btn-reset {
            display: inline-block; margin-top: 0.8rem; padding: 0.5rem 1.5rem;
            border-radius: 8px; font-size: 0.85rem; cursor: pointer;
            background: transparent; color: var(--text2); border: 1px solid var(--border);
            transition: all 0.2s;
        }
        .btn-reset:hover { border-color: #666; color: var(--text); }

        /* Error */
        .error {
            margin-top: 1.5rem; display: none; background: var(--error-bg);
            border: 1px solid var(--error-border); border-radius: 10px;
            padding: 1rem; color: var(--error); font-size: 0.9rem;
        }
        .error.active { display: block; }
        .error strong { display: block; margin-bottom: 0.3rem; }

        /* Spinner */
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            display: inline-block; width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
            border-radius: 50%; animation: spin 0.6s linear infinite;
            vertical-align: middle; margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Subtitulador</h1>
        <button class="theme-toggle" id="themeToggle" title="Cambiar tema">🌙</button>
    </div>
    <p class="subtitle">Sube un video, transcribe el audio y descarga con subtítulos</p>

    <div class="container">
        <div class="gpu-badge" id="gpuBadge">
            <span class="dot off"></span> Cargando info GPU...
        </div>

        <div class="dropzone" id="dropzone">
            <input type="file" id="fileInput" accept="video/*">
            <span class="icon">🎬</span>
            <div class="label">Arrastra un video aquí o haz clic para seleccionar</div>
            <div class="hint">MP4, MKV, AVI, MOV, WebM — hasta 2 GB</div>
            <div class="filename" id="filename"></div>
        </div>

        <button class="config-toggle" id="configToggle">⚙ Configuración avanzada</button>
        <div class="config-panel" id="configPanel">
            <div class="config-row">
                <div class="config-item">
                    <label>Modelo Whisper</label>
                    <select id="modelSelect">
                        <option value="tiny">tiny (rápido, ~75 MB)</option>
                        <option value="base" selected>base (~140 MB)</option>
                        <option value="small">small (~460 MB)</option>
                        <option value="medium">medium (~1.5 GB)</option>
                        <option value="large-v3">large-v3 (~3 GB, mejor calidad)</option>
                    </select>
                </div>
            </div>
            <div class="config-row">
                <div class="config-item">
                    <label>Sensibilidad silencio</label>
                    <input type="range" id="noiseThreshold" min="-50" max="-10" value="-30" step="5">
                    <div class="range-val" id="noiseVal">-30 dB</div>
                </div>
                <div class="config-item">
                    <label>Duración mín. segmento</label>
                    <input type="range" id="minDuration" min="0.2" max="2.0" value="0.4" step="0.1">
                    <div class="range-val" id="minDurVal">0.4 s</div>
                </div>
                <div class="config-item">
                    <label>Max repeticiones</label>
                    <input type="range" id="maxRepeats" min="1" max="10" value="3" step="1">
                    <div class="range-val" id="maxRepVal">3</div>
                </div>
            </div>
        </div>

        <div class="options">
            <label for="language">Audio:</label>
            <select id="language">
                <option value="">Auto-detectar</option>
                <option value="es">Español</option>
                <option value="en">English</option>
                <option value="pt">Português</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
                <option value="it">Italiano</option>
                <option value="ja">日本語</option>
                <option value="ko">한국어</option>
                <option value="zh">中文</option>
                <option value="ru">Русский</option>
                <option value="ar">العربية</option>
            </select>
        </div>

        <div class="options">
            <label for="targetLanguage">Subtítulos a:</label>
            <select id="targetLanguage">
                <option value="">Sin traducción</option>
                <option value="es" selected>Español</option>
                <option value="en">English</option>
                <option value="pt">Português</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
                <option value="it">Italiano</option>
                <option value="ja">日本語</option>
                <option value="ko">한국어</option>
                <option value="zh">中文</option>
                <option value="ru">Русский</option>
                <option value="ar">العربية</option>
            </select>
        </div>

        <div class="btn-row">
            <button class="btn btn-primary" id="btnTranscribe" disabled>
                Transcribir y añadir subtítulos
            </button>
            <button class="btn btn-secondary" id="btnSrt" disabled title="Solo descargar SRT">
                Descargar .srt
            </button>
        </div>

        <div class="progress-container" id="progress">
            <div class="progress-bar-bg">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="progress-text" id="progressText">Preparando...</div>
        </div>

        <div class="result" id="result">
            <div class="success-icon">✅</div>
            <div class="message" id="resultMessage">¡Listo!</div>
            <div class="preview" id="preview" style="display:none">
                <video id="previewVideo" controls></video>
            </div>
            <div id="downloadButtons"></div>
            <button class="btn-reset" id="btnReset">Procesar otro video</button>
        </div>

        <div class="error" id="error">
            <strong>Error</strong>
            <span id="errorText"></span>
        </div>
    </div>

    <script>
        // Elements
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const filename = document.getElementById('filename');
        const btnTranscribe = document.getElementById('btnTranscribe');
        const btnSrt = document.getElementById('btnSrt');
        const progress = document.getElementById('progress');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const result = document.getElementById('result');
        const resultMessage = document.getElementById('resultMessage');
        const downloadButtons = document.getElementById('downloadButtons');
        const preview = document.getElementById('preview');
        const previewVideo = document.getElementById('previewVideo');
        const btnReset = document.getElementById('btnReset');
        const errorDiv = document.getElementById('error');
        const errorText = document.getElementById('errorText');
        const language = document.getElementById('language');
        const targetLanguage = document.getElementById('targetLanguage');
        const gpuBadge = document.getElementById('gpuBadge');
        const themeToggle = document.getElementById('themeToggle');
        const configToggle = document.getElementById('configToggle');
        const configPanel = document.getElementById('configPanel');
        const noiseThreshold = document.getElementById('noiseThreshold');
        const noiseVal = document.getElementById('noiseVal');
        const minDuration = document.getElementById('minDuration');
        const minDurVal = document.getElementById('minDurVal');
        const maxRepeats = document.getElementById('maxRepeats');
        const maxRepVal = document.getElementById('maxRepVal');

        let selectedFile = null;
        let downloadUrls = [];

        // GPU info
        fetch('/gpu').then(r => r.json()).then(d => {
            gpuBadge.innerHTML = d.gpu
                ? `<span class="dot on"></span> GPU: ${d.device.toUpperCase()} (${d.compute_type})`
                : `<span class="dot off"></span> CPU (${d.compute_type})`;
        });

        // Theme toggle
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.dataset.theme = savedTheme;
        themeToggle.textContent = savedTheme === 'dark' ? '🌙' : '☀️';
        themeToggle.onclick = () => {
            const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
            document.documentElement.dataset.theme = next;
            themeToggle.textContent = next === 'dark' ? '🌙' : '☀️';
            localStorage.setItem('theme', next);
        };

        // Config toggle
        configToggle.onclick = () => configPanel.classList.toggle('open');

        // Range sliders
        noiseThreshold.oninput = () => noiseVal.textContent = noiseThreshold.value + ' dB';
        minDuration.oninput = () => minDurVal.textContent = parseFloat(minDuration.value).toFixed(1) + ' s';
        maxRepeats.oninput = () => maxRepVal.textContent = maxRepeats.value;

        // File handling
        dropzone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => { if (e.target.files.length) handleFile(e.target.files[0]); };
        dropzone.ondragover = (e) => { e.preventDefault(); dropzone.classList.add('dragover'); };
        dropzone.ondragleave = () => dropzone.classList.remove('dragover');
        dropzone.ondrop = (e) => { e.preventDefault(); dropzone.classList.remove('dragover'); if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); };

        function handleFile(file) {
            selectedFile = file;
            filename.textContent = `${file.name} (${(file.size / 1024 / 1024).toFixed(1)} MB)`;
            dropzone.classList.add('has-file');
            btnTranscribe.disabled = false;
            btnSrt.disabled = false;
            hideError();
        }

        function getFormData() {
            const fd = new FormData();
            fd.append('video', selectedFile);
            fd.append('language', language.value);
            fd.append('target_language', targetLanguage.value);
            fd.append('model', document.getElementById('modelSelect').value);
            fd.append('noise_threshold', noiseThreshold.value + 'dB');
            fd.append('min_duration', minDuration.value);
            fd.append('max_repeats', maxRepeats.value);
            return fd;
        }

        async function doTranscribe(endpoint, btn, onSuccess) {
            if (!selectedFile) return;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Procesando...';
            progress.classList.add('active');
            result.classList.remove('active');
            hideError();

            let pct = 0;
            const iv = setInterval(() => {
                pct = Math.min(pct + Math.random() * 3, 95);
                progressBar.style.width = pct + '%';
                if (pct < 15) progressText.textContent = 'Extrayendo audio...';
                else if (pct < 25) progressText.textContent = 'Detectando silencios...';
                else if (pct < 55) progressText.textContent = 'Transcribiendo...';
                else if (pct < 65) progressText.textContent = 'Limpiando...';
                else if (pct < 80) progressText.textContent = 'Traduciendo...';
                else if (pct < 92) progressText.textContent = 'Procesando video...';
                else progressText.textContent = 'Listo...';
            }, 1000);

            try {
                const resp = await fetch(endpoint, { method: 'POST', body: getFormData() });
                clearInterval(iv);
                if (!resp.ok) { const d = await resp.json(); throw new Error(d.error || 'Error'); }
                onSuccess(await resp.blob());
                progressBar.style.width = '100%';
                progressText.textContent = '¡Completado!';
                setTimeout(() => { progress.classList.remove('active'); result.classList.add('active'); }, 500);
            } catch (err) {
                clearInterval(iv);
                progress.classList.remove('active');
                showError(err.message);
                btn.disabled = false;
                btn.innerHTML = btn === btnTranscribe ? 'Transcribir y añadir subtítulos' : 'Descargar .srt';
            }
        }

        btnTranscribe.onclick = () => doTranscribe('/transcribe', btnTranscribe, (blob) => {
            const url = URL.createObjectURL(blob);
            downloadUrls.push(url);
            const ext = selectedFile.name.split('.').pop();
            const base = selectedFile.name.replace(/\.[^.]+$/, '');

            // Preview
            preview.style.display = 'block';
            previewVideo.src = url;

            resultMessage.textContent = '¡Tu video está subtitulado!';
            downloadButtons.innerHTML = `
                <a class="btn-download" href="${url}" download="${base}_subtitled.${ext}">Descargar video</a>`;
            btnTranscribe.disabled = false;
            btnTranscribe.innerHTML = 'Transcribir y añadir subtítulos';
        });

        btnSrt.onclick = () => doTranscribe('/transcribe-srt', btnSrt, (blob) => {
            const url = URL.createObjectURL(blob);
            downloadUrls.push(url);
            const base = selectedFile.name.replace(/\.[^.]+$/, '');

            preview.style.display = 'none';
            resultMessage.textContent = '¡SRT listo!';
            downloadButtons.innerHTML = `
                <a class="btn-download" href="${url}" download="${base}.srt">Descargar .srt</a>`;
            btnSrt.disabled = false;
            btnSrt.innerHTML = 'Descargar .srt';
        });

        btnReset.onclick = () => {
            selectedFile = null;
            fileInput.value = '';
            filename.textContent = '';
            dropzone.classList.remove('has-file');
            btnTranscribe.disabled = true;
            btnSrt.disabled = true;
            btnTranscribe.innerHTML = 'Transcribir y añadir subtítulos';
            btnSrt.innerHTML = 'Descargar .srt';
            result.classList.remove('active');
            progress.classList.remove('active');
            progressBar.style.width = '0%';
            preview.style.display = 'none';
            downloadButtons.innerHTML = '';
            hideError();
            downloadUrls.forEach(u => URL.revokeObjectURL(u));
            downloadUrls = [];
        };

        function showError(msg) { errorText.textContent = msg; errorDiv.classList.add('active'); }
        function hideError() { errorDiv.classList.remove('active'); }
    </script>
</body>
</html>
