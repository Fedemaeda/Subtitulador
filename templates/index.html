<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtitulador</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #222; --border: #333;
            --text: #e0e0e0; --text2: #888; --text3: #666;
            --accent: #7c5cfc; --accent2: #00d4ff; --accent3: #5a3fd4;
            --success: #4ade80; --danger: #ef4444;
            --error-bg: #2a1515; --error-border: #5c2020; --error: #f87171;
        }
        [data-theme="light"] {
            --bg: #f5f5f5; --surface: #fff; --surface2: #f0f0f0; --border: #ddd;
            --text: #1a1a1a; --text2: #666; --text3: #999;
            --accent: #6b4ce6; --accent2: #0099cc; --accent3: #5a3fd4;
            --success: #16a34a; --danger: #dc2626;
            --error-bg: #fef2f2; --error-border: #fecaca; --error: #dc2626;
        }
        html, body { height: 100%; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; flex-direction: column;
            padding: 0;
        }

        /* Header */
        .header { 
            display: flex; align-items: center; gap: 1rem; padding: 1rem;
            background: var(--surface); border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        h1 {
            font-size: 1.5rem; font-weight: 600; flex: 1;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .theme-toggle {
            background: transparent; border: 1px solid var(--border); border-radius: 8px;
            padding: 0.3rem 0.6rem; cursor: pointer; font-size: 1rem; color: var(--text);
        }
        .gpu-badge {
            font-size: 0.75rem; color: var(--text2); background: var(--surface2);
            border: 1px solid var(--border); border-radius: 6px; padding: 0.25rem 0.6rem;
        }

        /* Main content */
        .main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden; }

        /* Upload section */
        .upload-area { padding: 1.5rem; max-width: 700px; margin: 0 auto; }
        .upload-area.hidden { display: none; }
        .dropzone {
            border: 2px dashed var(--border); border-radius: 16px; padding: 2.5rem 2rem;
            text-align: center; cursor: pointer; transition: all 0.2s; background: var(--surface);
        }
        .dropzone:hover, .dropzone.dragover { border-color: var(--accent); }
        .dropzone.has-file { border-color: var(--accent2); border-style: solid; }
        .dropzone input[type="file"] { display: none; }
        .dropzone .icon { font-size: 2.5rem; margin-bottom: 0.8rem; }
        .dropzone .label { font-size: 1.05rem; color: var(--text); margin-bottom: 0.4rem; }
        .dropzone .hint { font-size: 0.8rem; color: var(--text3); }
        .filename { color: var(--accent2); font-weight: 500; margin-top: 0.5rem; }
        .config-toggle {
            margin-top: 1rem; background: none; border: 1px solid var(--border);
            border-radius: 8px; padding: 0.5rem 1rem; color: var(--text2);
            cursor: pointer; font-size: 0.85rem; width: 100%;
        }
        .config-panel {
            display: none; margin-top: 1rem; background: var(--surface);
            border: 1px solid var(--border); border-radius: 12px; padding: 1rem;
        }
        .config-panel.open { display: block; }
        .config-row { display: flex; gap: 1rem; margin-bottom: 0.8rem; flex-wrap: wrap; }
        .config-item { flex: 1; min-width: 130px; }
        .config-item label { display: block; font-size: 0.8rem; color: var(--text2); margin-bottom: 0.3rem; }
        .config-item select {
            width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border);
            border-radius: 6px; padding: 0.4rem; font-size: 0.85rem;
        }
        .config-item input[type="range"] {
            width: 100%; -webkit-appearance: none; height: 6px; background: var(--border);
            border-radius: 3px; outline: none; margin-top: 0.4rem;
        }
        .config-item input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
            background: var(--accent); cursor: pointer;
        }
        .range-val { font-size: 0.7rem; color: var(--text3); text-align: right; }
        .options { margin-top: 1rem; display: flex; gap: 1rem; align-items: center; }
        .options label { font-size: 0.85rem; color: var(--text2); white-space: nowrap; }
        .options select {
            flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border);
            border-radius: 8px; padding: 0.5rem 1rem; font-size: 0.9rem;
        }
        .options-row { display: flex; gap: 1rem; }
        .options-row .options { flex: 1; }
        .btn {
            padding: 0.85rem; border: none; border-radius: 12px;
            font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent3)); color: white; }
        .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(124,92,252,0.4); }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
        .progress-container { margin-top: 1rem; display: none; }
        .progress-container.active { display: block; }
        .progress-bar-bg { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; height: 8px; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); width: 0%; transition: width 0.3s; }
        .progress-text { font-size: 0.85rem; color: var(--text2); margin-top: 0.5rem; text-align: center; }
        .error { display: none; margin-top: 1rem; background: var(--error-bg); border: 1px solid var(--error-border); border-radius: 10px; padding: 1rem; color: var(--error); }

        /* Editor layout - ponytail: heights fixed in px to prevent video from growing */
        .editor { display: none; flex-direction: column; height: calc(100vh - 60px); overflow: hidden; }
        .editor.active { display: flex; }

        .editor-top { padding: 0.5rem 1rem; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .editor-bar {
            display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
        }
        .editor-bar h2 { font-size: 1rem; color: var(--text); flex: 1; }
        .editor-btn {
            padding: 0.4rem 0.8rem; border: none; border-radius: 6px; font-size: 0.8rem;
            font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .editor-btn.primary { background: var(--accent); color: white; }
        .editor-btn.secondary { background: var(--accent2); color: white; }
        .editor-btn.ghost { background: transparent; border: 1px solid var(--border); color: var(--text2); }
        .editor-btn:hover:not(:disabled) { opacity: 0.9; }
        .editor-btn:disabled { opacity: 0.35; cursor: not-allowed; }

        /* Video section - FIXED height, never grows */
        .video-section { 
            flex: 0 0 240px; padding: 0.5rem 1rem; background: var(--bg); border-bottom: 1px solid var(--border);
            display: flex; gap: 1rem; align-items: stretch;
        }
        .video-box {
            flex: 1; background: #000; border-radius: 8px; overflow: hidden;
            border: 1px solid var(--border);
        }
        .video-box video { width: 100%; height: 100%; max-height: 220px; object-fit: contain; }
        .video-controls { 
            flex: 0 0 120px; display: flex; flex-direction: column; gap: 0.3rem; justify-content: center;
        }
        .video-controls button {
            background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
            padding: 0.4rem; color: var(--text); cursor: pointer; font-size: 0.85rem;
        }
        .video-controls button:hover { border-color: var(--accent); }
        .time-display {
            font-family: 'Consolas', monospace; font-size: 0.85rem; color: var(--text2);
            text-align: center; padding: 0.3rem;
        }

        /* Visual timeline */
        .timeline-visual {
            padding: 0.5rem 1rem; background: var(--surface); border-bottom: 1px solid var(--border);
            flex: 0 0 60px;
        }
        .timeline-visual-label { font-size: 0.7rem; color: var(--text3); margin-bottom: 0.3rem; }
        .timeline-bar-container {
            position: relative; height: 40px; background: var(--bg); border-radius: 4px;
            border: 1px solid var(--border); overflow: hidden;
        }
        .timeline-bar {
            position: absolute; height: 100%; background: var(--accent); opacity: 0.7;
            border-right: 2px solid var(--accent2); cursor: grab; transition: opacity 0.2s;
        }
        .timeline-bar:hover { opacity: 0.9; }
        .timeline-bar.active { opacity: 1; box-shadow: 0 0 8px var(--accent); }
        .timeline-playhead {
            position: absolute; top: 0; width: 2px; height: 100%; background: var(--accent2);
            z-index: 10; pointer-events: none;
        }

        /* Subtitles list */
        .subtitles-section {
            flex: 1; display: flex; flex-direction: column; overflow: hidden;
            padding: 0.5rem 1rem;
        }
        .subtitles-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
        .subtitles-header span { font-size: 0.85rem; color: var(--text2); flex: 1; }
        .subtitles-header button {
            background: var(--accent); color: white; border: none; border-radius: 6px;
            padding: 0.3rem 0.6rem; font-size: 0.75rem; cursor: pointer;
        }
        .subtitles-list { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
        .subtitles-list::-webkit-scrollbar { width: 6px; }
        .subtitles-list::-webkit-scrollbar-track { background: transparent; }
        .subtitles-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .sub-item {
            display: grid; grid-template-columns: 40px 60px 60px 1fr auto auto auto; gap: 0.4rem;
            padding: 0.5rem; margin-bottom: 0.3rem; background: var(--surface2); border-radius: 6px;
            border: 1px solid var(--border); align-items: center;
        }
        .sub-item:hover { background: rgba(124,92,252,0.1); }
        .sub-item.active { border-left: 3px solid var(--accent); background: rgba(124,92,252,0.15); }
        .sub-num { font-size: 0.7rem; color: var(--text3); text-align: center; }
        .sub-time-input {
            background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
            color: var(--text2); font-size: 0.7rem; padding: 0.2rem; text-align: center;
            font-family: 'Consolas', monospace; width: 100%;
        }
        .sub-time-input:focus { outline: none; border-color: var(--accent); color: var(--text); }
        .sub-text {
            background: transparent; border: 1px solid transparent; border-radius: 4px;
            color: var(--text); font-size: 0.9rem; padding: 0.3rem; resize: none;
            font-family: inherit; width: 100%;
        }
        .sub-text:focus { outline: none; border-color: var(--accent); background: var(--bg); }
        .sub-actions { display: flex; gap: 0.2rem; }
        .sub-btn {
            background: none; border: none; cursor: pointer; font-size: 0.9rem;
            color: var(--text3); padding: 0.2rem; border-radius: 4px; transition: all 0.15s;
        }
        .sub-btn:hover { color: var(--accent); background: var(--bg); }
        .sub-btn.del:hover { color: var(--danger); }

        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
            border-radius: 50%; animation: spin 0.6s linear infinite;
            vertical-align: middle; margin-right: 0.4rem;
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div class="header">
        <h1>Subtitulador</h1>
        <span class="gpu-badge" id="gpuBadge">CPU</span>
        <button class="theme-toggle" id="themeToggle">🌙</button>
    </div>

    <div class="main">
        <!-- UPLOAD -->
        <div class="upload-area" id="uploadArea">
            <div class="dropzone" id="dropzone">
                <input type="file" id="fileInput" accept="video/*">
                <div class="icon">🎬</div>
                <div class="label">Arrastra un video aquí o haz clic</div>
                <div class="hint">MP4, MKV, AVI, MOV, WebM — hasta 2 GB</div>
                <div class="filename" id="filename"></div>
            </div>

            <div id="configSection">
                <button class="config-toggle" id="configToggle">⚙ Configuración avanzada</button>
                <div class="config-panel" id="configPanel">
                    <div class="config-row">
                        <div class="config-item">
                            <label>Modelo Whisper</label>
                            <select id="modelSelect">
                                <option value="tiny">tiny (~75 MB)</option>
                                <option value="base" selected>base (~140 MB)</option>
                                <option value="small">small (~460 MB)</option>
                                <option value="medium">medium (~1.5 GB)</option>
                                <option value="large-v3">large-v3 (~3 GB)</option>
                            </select>
                        </div>
                    </div>
                    <div class="config-row">
                        <div class="config-item">
                            <label>Silencio</label>
                            <input type="range" id="noiseThreshold" min="-50" max="-10" value="-30" step="5">
                            <div class="range-val" id="noiseVal">-30 dB</div>
                        </div>
                        <div class="config-item">
                            <label>Duración mín.</label>
                            <input type="range" id="minDuration" min="0.2" max="2.0" value="0.4" step="0.1">
                            <div class="range-val" id="minDurVal">0.4 s</div>
                        </div>
                        <div class="config-item">
                            <label>Max repet.</label>
                            <input type="range" id="maxRepeats" min="1" max="10" value="3" step="1">
                            <div class="range-val" id="maxRepVal">3</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="options-row">
                <div class="options">
                    <label>Audio:</label>
                    <select id="language">
                        <option value="">Auto-detectar</option>
                        <option value="es">Español</option>
                        <option value="en">English</option>
                        <option value="pt">Português</option>
                        <option value="fr">Français</option>
                        <option value="de">Deutsch</option>
                        <option value="it">Italiano</option>
                        <option value="ja">日本語</option>
                        <option value="ko">한국어</option>
                        <option value="zh">中文</option>
                        <option value="ru">Русский</option>
                        <option value="ar">العربية</option>
                    </select>
                </div>
                <div class="options">
                    <label>Subtítulos a:</label>
                    <select id="targetLanguage">
                        <option value="">Sin traducción</option>
                        <option value="es" selected>Español</option>
                        <option value="en">English</option>
                        <option value="pt">Português</option>
                        <option value="fr">Français</option>
                        <option value="de">Deutsch</option>
                        <option value="it">Italiano</option>
                        <option value="ja">日本語</option>
                        <option value="ko">한국어</option>
                        <option value="zh">中文</option>
                        <option value="ru">Русский</option>
                        <option value="ar">العربية</option>
                    </select>
                </div>
            </div>

            <button class="btn btn-primary" id="btnTranscribe" style="margin-top: 1rem; width: 100%;" disabled>Transcribir y editar subtítulos</button>

            <div class="progress-container" id="progress">
                <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
                <div class="progress-text" id="progressText">Preparando...</div>
            </div>

            <div class="error" id="error"><strong>Error</strong> <span id="errorText"></span></div>
        </div>

        <!-- EDITOR -->
        <div class="editor" id="editor">
            <div class="editor-top">
                <div class="editor-bar">
                    <h2>Editar subtítulos</h2>
                    <button class="editor-btn ghost" id="btnUndo" title="Deshacer (Ctrl+Z)">&#x21A9; Deshacer</button>
                    <button class="editor-btn ghost" id="btnRedo" title="Rehacer (Ctrl+Shift+Z)">&#x21AA; Rehacer</button>
                    <button class="editor-btn ghost" id="btnNewVideo">📁 Otro video</button>
                    <button class="editor-btn ghost" id="btnBatchExport" title="Descargar .srt + video quemado">📦 Exportar todo</button>
                    <button class="editor-btn primary" id="btnBurn">Quemar en video</button>
                    <button class="editor-btn secondary" id="btnDownloadSrt">Descargar .srt</button>
                </div>
            </div>

            <!-- Video -->
            <div class="video-section">
                <div class="video-box">
                    <video id="videoPlayer" controls></video>
                </div>
                <div class="video-controls">
                    <button id="btnSeekStart" title="Inicio segmento">⏮</button>
                    <button id="btnPlaySeg" title="Reproducir/Pausar">▶⏸</button>
                    <button id="btnSeekEnd" title="Fin segmento">⏭</button>
                    <div class="time-display" id="timeDisplay">0:00.0</div>
                </div>
            </div>

            <!-- Timeline visual -->
            <div class="timeline-visual">
                <div class="timeline-visual-label" id="timelineLabel">Timeline</div>
                <div class="timeline-bar-container" id="timelineBarContainer">
                    <div class="timeline-playhead" id="timelinePlayhead"></div>
                </div>
            </div>

            <!-- Subtitles list -->
            <div class="subtitles-section">
                <div class="subtitles-header">
                    <span id="subCount">0 subtítulos</span>
                    <button id="btnAddSub" title="Añadir nuevo">+ Añadir</button>
                </div>
                <div class="subtitles-list" id="subtitlesList"></div>
            </div>
        </div>
    </div>

    <script>
        // ===== STATE =====
        let selectedFile = null;
        let sessionId = null;
        let segments = [];
        let activeSegIdx = -1;
        let videoDuration = 0;

        // ===== UNDO/REDO =====
        const _undoStack = [];
        const _redoStack = [];
        const MAX_UNDO = 50;

        function pushUndo() {
            _undoStack.push(JSON.stringify(segments));
            if (_undoStack.length > MAX_UNDO) _undoStack.shift();
            _redoStack.length = 0;
            updateUndoRedoButtons();
        }

        function undo() {
            if (!_undoStack.length) return;
            _redoStack.push(JSON.stringify(segments));
            segments = JSON.parse(_undoStack.pop());
            renderSubtitles(); saveSegments(); updateUndoRedoButtons();
        }

        function redo() {
            if (!_redoStack.length) return;
            _undoStack.push(JSON.stringify(segments));
            segments = JSON.parse(_redoStack.pop());
            renderSubtitles(); saveSegments(); updateUndoRedoButtons();
        }

        function updateUndoRedoButtons() {
            $('btnUndo').disabled = !_undoStack.length;
            $('btnRedo').disabled = !_redoStack.length;
        }

        // ===== ELEMENTS =====
        const $ = id => document.getElementById(id);
        const uploadArea = $('uploadArea');
        const configSection = $('configSection');
        const dropzone = $('dropzone');
        const fileInput = $('fileInput');
        const filename = $('filename');
        const btnTranscribe = $('btnTranscribe');
        const progress = $('progress');
        const progressBar = $('progressBar');
        const progressText = $('progressText');
        const errorDiv = $('error');
        const errorText = $('errorText');
        const editor = $('editor');
        const videoPlayer = $('videoPlayer');
        const subtitlesList = $('subtitlesList');
        const subCount = $('subCount');
        const timeDisplay = $('timeDisplay');
        const timelineBarContainer = $('timelineBarContainer');
        const timelinePlayhead = $('timelinePlayhead');

        // ===== THEME =====
        const saved = localStorage.getItem('theme') || 'dark';
        document.documentElement.dataset.theme = saved;
        $('themeToggle').textContent = saved === 'dark' ? '🌙' : '☀️';
        $('themeToggle').onclick = () => {
            const n = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
            document.documentElement.dataset.theme = n;
            $('themeToggle').textContent = n === 'dark' ? '🌙' : '☀️';
            localStorage.setItem('theme', n);
        };

        // ===== GPU =====
        fetch('/gpu').then(r=>r.json()).then(d=>{
            $('gpuBadge').innerHTML = d.gpu ? `<span style="color: var(--success);">●</span> GPU` : `<span style="color: #f59e0b;">●</span> CPU`;
        });

        // ===== CONFIG =====
        $('configToggle').onclick = () => $('configPanel').classList.toggle('open');
        $('noiseThreshold').oninput = e => $('noiseVal').textContent = e.target.value + ' dB';
        $('minDuration').oninput = e => $('minDurVal').textContent = parseFloat(e.target.value).toFixed(1) + ' s';
        $('maxRepeats').oninput = e => $('maxRepVal').textContent = e.target.value;

        // ===== FILE HANDLING =====
        dropzone.onclick = () => fileInput.click();
        fileInput.onchange = e => { if (e.target.files.length) handleFile(e.target.files[0]); };
        dropzone.ondragover = e => { e.preventDefault(); dropzone.classList.add('dragover'); };
        dropzone.ondragleave = () => dropzone.classList.remove('dragover');
        dropzone.ondrop = e => { e.preventDefault(); dropzone.classList.remove('dragover'); if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); };

        function handleFile(file) {
            selectedFile = file;
            filename.textContent = `${file.name} (${(file.size/1024/1024).toFixed(1)} MB)`;
            dropzone.classList.add('has-file');
            btnTranscribe.disabled = false;
        }

        // ===== TRANSCRIBE =====
        btnTranscribe.onclick = async () => {
            if (!selectedFile) return;
            btnTranscribe.disabled = true;
            btnTranscribe.innerHTML = '<span class="spinner"></span> Procesando...';
            progress.classList.add('active');
            errorDiv.style.display = 'none';

            let pct = 0;
            const iv = setInterval(() => {
                pct = Math.min(pct + Math.random() * 3, 95);
                progressBar.style.width = pct + '%';
                if (pct < 15) progressText.textContent = 'Extrayendo audio...';
                else if (pct < 25) progressText.textContent = 'Detectando silencios...';
                else if (pct < 55) progressText.textContent = 'Transcribiendo...';
                else if (pct < 65) progressText.textContent = 'Limpiando...';
                else if (pct < 80) progressText.textContent = 'Traduciendo...';
                else progressText.textContent = 'Preparando editor...';
            }, 1000);

            try {
                const fd = new FormData();
                fd.append('video', selectedFile);
                fd.append('language', $('language').value);
                fd.append('target_language', $('targetLanguage').value);
                fd.append('model', $('modelSelect').value);
                fd.append('noise_threshold', $('noiseThreshold').value + 'dB');
                fd.append('min_duration', $('minDuration').value);
                fd.append('max_repeats', $('maxRepeats').value);

                const resp = await fetch('/transcribe', { method: 'POST', body: fd });
                clearInterval(iv);
                if (!resp.ok) { const d = await resp.json(); throw new Error(d.error); }

                const data = await resp.json();
                sessionId = data.session_id;
                segments = data.segments;

                progressBar.style.width = '100%';
                progressText.textContent = '¡Listo!';

                setTimeout(() => {
                    progress.classList.remove('active');
                    uploadArea.hidden = true;
                    editor.classList.add('active');
                    _undoStack.length = 0; _redoStack.length = 0;
                    openEditor(); 
                    updateUndoRedoButtons();
                }, 400);

            } catch (err) {
                clearInterval(iv);
                progress.classList.remove('active');
                errorText.textContent = err.message;
                errorDiv.style.display = 'block';
                btnTranscribe.disabled = false;
                btnTranscribe.innerHTML = 'Transcribir y editar subtítulos';
            }
        };

        // ===== EDITOR =====
        function openEditor() {
            videoPlayer.src = `/api/session/${sessionId}/video`;
            renderSubtitles();
        }

        function renderSubtitles() {
            subtitlesList.innerHTML = '';
            subCount.textContent = `${segments.length} subtítulos`;
            renderTimeline();

            segments.forEach((seg, i) => {
                const item = document.createElement('div');
                item.className = 'sub-item' + (i === activeSegIdx ? ' active' : '');
                item.dataset.idx = i;

                item.innerHTML = `
                    <div class="sub-num">${i + 1}</div>
                    <input class="sub-time-input" type="text" value="${fmtTime(seg.start)}" data-idx="${i}" data-field="start" title="Inicio">
                    <input class="sub-time-input" type="text" value="${fmtTime(seg.end)}" data-idx="${i}" data-field="end" title="Fin">
                    <textarea class="sub-text" rows="2" data-idx="${i}" title="Texto del subtítulo">${escHtml(seg.text)}</textarea>
                    <div class="sub-actions">
                        <button class="sub-btn" data-action="play" data-idx="${i}" title="Reproducir">▶</button>
                        <button class="sub-btn del" data-action="delete" data-idx="${i}" title="Eliminar">✕</button>
                    </div>
                `;
                subtitlesList.appendChild(item);
            });

            // Event listeners
            subtitlesList.onclick = e => {
                const btn = e.target.closest('[data-action]');
                if (!btn) return;
                const idx = parseInt(btn.dataset.idx);
                if (btn.dataset.action === 'play') playSegment(idx);
                else if (btn.dataset.action === 'delete') {
                    pushUndo();
                    segments.splice(idx, 1);
                    if (activeSegIdx >= segments.length) activeSegIdx = segments.length - 1;
                    renderSubtitles(); saveSegments();
                }
            };

            // Text editing
            subtitlesList.querySelectorAll('.sub-text').forEach(el => {
                let prev = '';
                el.onfocus = () => { prev = el.value; activeSegIdx = parseInt(el.dataset.idx); highlightActive(); };
                el.oninput = () => { segments[parseInt(el.dataset.idx)].text = el.value; saveDebounced(); };
                el.onblur = () => { if (el.value !== prev) pushUndo(); };
            });

            // Time editing
            subtitlesList.querySelectorAll('.sub-time-input').forEach(el => {
                let prev = el.value;
                el.onfocus = () => { prev = el.value; };
                el.onchange = () => {
                    const val = parseTime(el.value);
                    if (val !== null) { pushUndo(); segments[parseInt(el.dataset.idx)][el.dataset.field] = val; saveDebounced(); }
                    else el.value = prev;
                };
            });

            highlightActive();
        }

        function renderTimeline() {
            if (!videoDuration) return;
            const bars = subtitlesList.parentElement.querySelectorAll('.timeline-bar');
            bars.forEach(b => b.remove());

            segments.forEach((seg, i) => {
                const bar = document.createElement('div');
                bar.className = 'timeline-bar' + (i === activeSegIdx ? ' active' : '');
                bar.dataset.idx = i;
                
                const dur = videoDuration;
                const left = (seg.start / dur) * 100;
                const width = ((seg.end - seg.start) / dur) * 100;
                
                bar.style.left = left + '%';
                bar.style.width = Math.max(width, 2) + '%';
                
                bar.onclick = () => { activeSegIdx = i; highlightActive(); playSegment(i); };
                timelineBarContainer.appendChild(bar);
            });
        }

        function highlightActive() {
            subtitlesList.querySelectorAll('.sub-item').forEach((r, i) => r.classList.toggle('active', i === activeSegIdx));
            timelineBarContainer.querySelectorAll('.timeline-bar').forEach((b, i) => b.classList.toggle('active', i === activeSegIdx));
        }

        function playSegment(idx) {
            activeSegIdx = idx;
            highlightActive();
            const seg = segments[idx];
            videoPlayer.currentTime = seg.start;
            videoPlayer.play();
            const checker = () => {
                if (videoPlayer.currentTime >= seg.end || videoPlayer.paused) {
                    videoPlayer.pause();
                    videoPlayer.removeEventListener('timeupdate', checker);
                }
            };
            videoPlayer.addEventListener('timeupdate', checker);
        }

        let saveTimeout;
        function saveDebounced() { clearTimeout(saveTimeout); saveTimeout = setTimeout(saveSegments, 500); }
        function saveSegments() {
            fetch(`/api/session/${sessionId}/segments`, {
                method: 'PUT', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({segments})
            });
        }

        $('btnAddSub').onclick = () => {
            pushUndo();
            const lastEnd = segments.length ? segments[segments.length-1].end : 0;
            segments.push({start: lastEnd, end: lastEnd + 2, text: ''});
            renderSubtitles(); saveSegments();
            subtitlesList.scrollTop = subtitlesList.scrollHeight;
        };

        videoPlayer.onloadedmetadata = () => {
            videoDuration = videoPlayer.duration;
            renderTimeline();
        };

        videoPlayer.ontimeupdate = () => {
            timeDisplay.textContent = fmtTime(videoPlayer.currentTime);
            timelinePlayhead.style.left = (videoPlayer.currentTime / videoDuration * 100) + '%';
            
            const t = videoPlayer.currentTime;
            let found = -1;
            for (let i = 0; i < segments.length; i++) {
                if (t >= segments[i].start && t <= segments[i].end) { found = i; break; }
            }
            if (found !== -1 && found !== activeSegIdx) {
                activeSegIdx = found;
                highlightActive();
                const item = subtitlesList.children[found];
                if (item) item.scrollIntoView({block: 'nearest', behavior: 'smooth'});
            }
        };

        $('btnPlaySeg').onclick = () => { if (activeSegIdx >= 0) playSegment(activeSegIdx); else videoPlayer.play(); };
        $('btnSeekStart').onclick = () => { if (activeSegIdx >= 0) videoPlayer.currentTime = segments[activeSegIdx].start; };
        $('btnSeekEnd').onclick = () => { if (activeSegIdx >= 0) videoPlayer.currentTime = segments[activeSegIdx].end; };

        // New video
        $('btnNewVideo').onclick = () => {
            editor.classList.remove('active');
            uploadArea.hidden = false;
            videoPlayer.pause(); videoPlayer.src = '';
            selectedFile = null; fileInput.value = ''; filename.textContent = '';
            dropzone.classList.remove('has-file');
            btnTranscribe.disabled = true;
            btnTranscribe.innerHTML = 'Transcribir y editar subtítulos';
            progress.classList.remove('active');
            progressBar.style.width = '0%';
            errorDiv.style.display = 'none';
            _undoStack.length = 0; _redoStack.length = 0;
            activeSegIdx = -1;
        };

        // Download SRT
        $('btnDownloadSrt').onclick = () => { window.location.href = `/api/session/${sessionId}/srt`; };

        // Burn
        $('btnBurn').onclick = async () => {
            const btn = $('btnBurn');
            btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Quemando...';
            try {
                const resp = await fetch(`/api/session/${sessionId}/burn`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({})
                });
                if (!resp.ok) { const d = await resp.json(); throw new Error(d.error); }
                const blob = await resp.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url;
                a.download = `subtitled.${selectedFile ? selectedFile.name.split('.').pop() : 'mp4'}`;
                a.click(); URL.revokeObjectURL(url);
            } catch (err) { alert('Error: ' + err.message); }
            btn.disabled = false; btn.innerHTML = 'Quemar en video';
        };

        // Batch export
        $('btnBatchExport').onclick = async () => {
            const btn = $('btnBatchExport');
            btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Exportando...';
            try {
                const srtLink = document.createElement('a');
                srtLink.href = `/api/session/${sessionId}/srt`;
                srtLink.download = 'subtitles.srt';
                srtLink.click();
                const resp = await fetch(`/api/session/${sessionId}/burn`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({})
                });
                if (!resp.ok) { const d = await resp.json(); throw new Error(d.error); }
                const blob = await resp.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url;
                a.download = `subtitled.${selectedFile ? selectedFile.name.split('.').pop() : 'mp4'}`;
                a.click(); URL.revokeObjectURL(url);
            } catch (err) { alert('Error: ' + err.message); }
            btn.disabled = false; btn.innerHTML = '📦 Exportar todo';
        };

        // ===== KEYBOARD SHORTCUTS =====
        const isInput = () => {
            const el = document.activeElement;
            return el && (el.tagName === 'TEXTAREA' || el.tagName === 'INPUT');
        };

        document.addEventListener('keydown', e => {
            if (e.ctrlKey && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); return; }
            if (e.ctrlKey && (e.key === 'Z' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); return; }
            if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); return; }

            if (isInput()) return;

            if (e.key === ' ') {
                e.preventDefault();
                if (activeSegIdx >= 0) {
                    if (videoPlayer.paused) playSegment(activeSegIdx);
                    else videoPlayer.pause();
                } else {
                    videoPlayer.paused ? videoPlayer.play() : videoPlayer.pause();
                }
            }
            if (e.key === 'Delete' || e.key === 'Backspace') {
                if (activeSegIdx >= 0) {
                    e.preventDefault();
                    pushUndo();
                    segments.splice(activeSegIdx, 1);
                    if (activeSegIdx >= segments.length) activeSegIdx = segments.length - 1;
                    renderSubtitles(); saveSegments();
                }
            }
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (segments.length) {
                    activeSegIdx = activeSegIdx <= 0 ? segments.length - 1 : activeSegIdx - 1;
                    highlightActive();
                    const item = subtitlesList.children[activeSegIdx];
                    if (item) item.scrollIntoView({block: 'nearest', behavior: 'smooth'});
                }
            }
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (segments.length) {
                    activeSegIdx = activeSegIdx >= segments.length - 1 ? 0 : activeSegIdx + 1;
                    highlightActive();
                    const item = subtitlesList.children[activeSegIdx];
                    if (item) item.scrollIntoView({block: 'nearest', behavior: 'smooth'});
                }
            }
            if (e.key === 'Escape') {
                activeSegIdx = -1;
                highlightActive();
                document.activeElement.blur();
            }
        });

        // ===== UTILS =====
        function fmtTime(sec) {
            if (sec == null || isNaN(sec)) return '0:00.0';
            const m = Math.floor(sec / 60);
            const s = (sec % 60).toFixed(1);
            return `${m}:${s.padStart(4, '0')}`;
        }
        function parseTime(str) {
            try {
                if (str.includes(':')) { const [m, s] = str.split(':'); return parseInt(m) * 60 + parseFloat(s); }
                return parseFloat(str);
            } catch { return null; }
        }
        function escHtml(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }
    </script>
</body>
</html>
